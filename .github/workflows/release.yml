name: Release

on:
  push:
    tags:
      - "core/v*"

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Run tests
        working-directory: core
        run: go test ./...

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#core/}" >> "$GITHUB_OUTPUT"

      - name: Build linux/amd64
        working-directory: core
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X github.com/gartner24/forge/core/cmd.version=${{ steps.version.outputs.VERSION }}" -o ../dist/forge-linux-amd64 .

      - name: Build linux/arm64
        working-directory: core
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X github.com/gartner24/forge/core/cmd.version=${{ steps.version.outputs.VERSION }}" -o ../dist/forge-linux-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Forge ${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          files: |
            dist/forge-linux-amd64
            dist/forge-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
